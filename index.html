<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#523626">
    <title>PezuñoKeep</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="/icons/Copilot_20260412_203927-128.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --core-brown: #523626;
            --tall-dark: #2C2020;
            --field-green: #4CAF50;
            --cream: #F3F2E7;
            --white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Open Sans', sans-serif;
            background: var(--white);
            color: var(--tall-dark);
            min-height: 100vh;
        }

        .header {
            background: var(--white);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--cream);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--core-brown);
        }

        .logo-img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
        }

        .btn-icon {
            background: var(--cream);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .board {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            min-height: calc(100vh - 80px);
            overflow-x: auto;
        }

        .column {
            min-width: 280px;
            max-width: 320px;
            background: var(--cream);
            border-radius: 16px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--white);
        }

        .column-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1rem;
        }

        .column-count {
            background: var(--white);
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .cards-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            min-height: 100px;
        }

        .card {
            background: var(--white);
            border-radius: 12px;
            padding: 1rem;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card-title {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .btn-add {
            background: var(--cream);
            border: none;
            padding: 0.75rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            color: var(--tall-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .fab {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--field-green);
            color: white;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            z-index: 1000;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--white);
            border-radius: 16px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
        }

        .modal-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: var(--core-brown);
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            background: var(--cream);
            font-size: 1rem;
        }

        .input-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-secondary {
            background: var(--cream);
        }

        .btn-primary {
            background: var(--field-green);
            color: white;
        }

        @media (max-width: 768px) {
            .board {
                flex-direction: column;
            }
            .column {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="/icons/Copilot_20260412_203927-64.png" class="logo-img" alt="Pezuño">
            <span>PezuñoKeep</span>
        </div>
        <div class="header-actions">
            <button class="btn-icon" onclick="clearAll()">🗑️</button>
        </div>
    </header>

    <main class="board" id="board">
        <section class="column" data-column="inbox">
            <div class="column-header">
                <span class="column-title">📥 INBOX</span>
                <span class="column-count" id="count-inbox">0</span>
            </div>
            <div class="cards-container" id="inbox-cards"></div>
            <button class="btn-add" onclick="addCard('inbox')">+ Agregar</button>
        </section>

        <section class="column" data-column="today">
            <div class="column-header">
                <span class="column-title">⚡ HOY</span>
                <span class="column-count" id="count-today">0</span>
            </div>
            <div class="cards-container" id="today-cards"></div>
            <button class="btn-add" onclick="addCard('today')">+ Agregar</button>
        </section>

        <section class="column" data-column="calendar">
            <div class="column-header">
                <span class="column-title">📅 CALENDARIO</span>
                <span class="column-count" id="count-calendar">0</span>
            </div>
            <div class="cards-container" id="calendar-cards"></div>
            <button class="btn-add" onclick="addCard('calendar')">+ Agregar</button>
        </section>

        <section class="column" data-column="projects">
            <div class="column-header">
                <span class="column-title">🐴 PROYECTOS</span>
                <span class="column-count" id="count-projects">0</span>
            </div>
            <div class="cards-container" id="projects-cards"></div>
            <button class="btn-add" onclick="addCard('projects')">+ Agregar</button>
        </section>

        <section class="column" data-column="references">
            <div class="column-header">
                <span class="column-title">📚 REFERENCIAS</span>
                <span class="column-count" id="count-references">0</span>
            </div>
            <div class="cards-container" id="references-cards"></div>
            <button class="btn-add" onclick="addCard('references')">+ Agregar</button>
        </section>
    </main>

    <button class="fab" onclick="addCard('inbox')">+</button>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2 class="modal-title" id="modal-title">Nueva Nota</h2>
            <div class="input-group">
                <label for="note-title">¿Qué necesitas recordar?</label>
                <input type="text" id="note-title" placeholder="Escribe aquí...">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="saveCard()">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        let cards = JSON.parse(localStorage.getItem('pezunokeep-cards')) || [];
        let currentColumn = 'inbox';

        function saveCards() {
            localStorage.setItem('pezunokeep-cards', JSON.stringify(cards));
            updateCounts();
        }

        function updateCounts() {
            ['inbox', 'today', 'calendar', 'projects', 'references'].forEach(col => {
                document.getElementById(`count-${col}`).textContent = cards.filter(c => c.column === col).length;
            });
        }

        function renderCards() {
            ['inbox', 'today', 'calendar', 'projects', 'references'].forEach(col => {
                const container = document.getElementById(`${col}-cards`);
                container.innerHTML = '';
                cards.filter(c => c.column === col).forEach(card => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `<div class="card-title">${card.title}</div>`;
                    div.onclick = () => editCard(card.id);
                    container.appendChild(div);
                });
            });
            updateCounts();
        }

        function addCard(column) {
            currentColumn = column;
            document.getElementById('modal-title').textContent = 'Nueva Nota';
            document.getElementById('note-title').value = '';
            document.getElementById('modal').classList.add('active');
            document.getElementById('note-title').focus();
        }

        function editCard(id) {
            const card = cards.find(c => c.id === id);
            if (!card) return;
            currentColumn = card.column;
            document.getElementById('modal-title').textContent = 'Editar Nota';
            document.getElementById('note-title').value = card.title;
            document.getElementById('modal').classList.add('active');
            document.getElementById('note-title').focus();
        }

        function saveCard() {
            const title = document.getElementById('note-title').value;
            if (!title.trim()) return;

            const newCard = {
                id: Date.now().toString(),
                title,
                column: currentColumn,
                created: new Date().toISOString()
            };

            cards.push(newCard);
            saveCards();
            renderCards();
            closeModal();
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function clearAll() {
            if (confirm('¿Borrar todo?')) {
                cards = [];
                saveCards();
                renderCards();
            }
        }

        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
            if (e.key === 'Enter' && document.getElementById('modal').classList.contains('active')) {
                saveCard();
            }
        });

        renderCards();
    </script>
</body>
</html>
